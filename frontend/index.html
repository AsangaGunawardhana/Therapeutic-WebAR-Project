<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Therapeutic Environment Setup</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        background: linear-gradient(135deg, #e8f4f8 0%, #f7f9fc 100%);
        color: #2c3e50;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .setup-container {
        max-width: 500px;
        width: 100%;
        background: #ffffff;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        border: 1px solid #e1e8ed;
      }

      h2 {
        text-align: center;
        margin: 0 0 12px 0;
        font-size: 26px;
        font-weight: 600;
        color: #1a365d;
      }

      .subtitle {
        text-align: center;
        margin: 0 0 32px 0;
        font-size: 14px;
        color: #64748b;
        line-height: 1.6;
      }

      .form-group {
        margin-bottom: 28px;
      }

      label {
        display: block;
        margin-bottom: 10px;
        font-size: 14px;
        font-weight: 500;
        color: #334155;
      }

      select {
        width: 100%;
        padding: 14px 16px;
        font-size: 15px;
        border: 2px solid #e2e8f0;
        border-radius: 10px;
        background: #f8fafc;
        color: #1e293b;
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: inherit;
      }

      select:hover {
        border-color: #cbd5e1;
        background: #ffffff;
      }

      select:focus {
        outline: none;
        border-color: #3b82f6;
        background: #ffffff;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      }

      .toggle-group {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #f8fafc;
        padding: 16px 18px;
        border-radius: 10px;
        border: 2px solid #e2e8f0;
        margin-bottom: 32px;
        transition: all 0.2s ease;
      }

      .toggle-group:hover {
        background: #ffffff;
        border-color: #cbd5e1;
      }

      .toggle-group label {
        margin: 0;
        font-size: 14px;
        color: #334155;
      }

      /* Custom Toggle Switch */
      .toggle-switch {
        position: relative;
        width: 52px;
        height: 28px;
      }

      .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #cbd5e1;
        transition: 0.3s;
        border-radius: 28px;
      }

      .slider:before {
        position: absolute;
        content: "";
        height: 20px;
        width: 20px;
        left: 4px;
        bottom: 4px;
        background-color: white;
        transition: 0.3s;
        border-radius: 50%;
      }

      input:checked + .slider {
        background-color: #3b82f6;
      }

      input:checked + .slider:before {
        transform: translateX(24px);
      }

      #launchBtn {
        width: 100%;
        padding: 16px;
        font-size: 16px;
        font-weight: 600;
        color: #ffffff;
        background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
      }

      #launchBtn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
      }

      #launchBtn:active {
        transform: translateY(0);
      }

      .info-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-left: 8px;
        padding: 2px 8px;
        background: #dbeafe;
        color: #1e40af;
        border-radius: 12px;
        font-size: 11px;
        font-weight: 500;
      }

      @media (max-width: 768px) {
        body {
          padding: 15px;
        }

        .setup-container {
          padding: 28px 24px;
        }

        h2 {
          font-size: 22px;
        }

        .subtitle {
          font-size: 13px;
          margin-bottom: 24px;
        }
      }

      @media (max-width: 480px) {
        body {
          padding: 10px;
        }

        .setup-container {
          padding: 24px 20px;
        }

        h2 {
          font-size: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="setup-container">
      <h2>Therapeutic Environment Setup</h2>
      <p class="subtitle">Configure your personalized calming spectrum to begin your recovery session</p>
      
      <div class="form-group">
        <label for="userPalette">
          Select Your Preferred Calming Spectrum
          <span class="info-badge">⚕️ Evidence-Based</span>
        </label>
        <select id="userPalette">
          <option value="AMBER">🟡 Amber — Cortisol Reduction</option>
          <option value="VIOLET">🟣 Violet — Nervous System Recovery</option>
          <option value="PINK">🌸 Soft Pink — Emotional Soothing</option>
          <option value="EARTH">🟤 Earth Tones — Stability & Grounding</option>
        </select>
      </div>

      <div class="toggle-group">
        <label for="chatbotToggle">Enable Interactive Chatbot Guidance</label>
        <label class="toggle-switch">
          <input type="checkbox" id="chatbotToggle" checked>
          <span class="slider"></span>
        </label>
      </div>

      <button id="launchBtn">Initialize AR Recovery Room</button>
    </div>

    <script src="main.js"></script>
  </body>
</html>
