<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- Mobile AR Optimization: Prevents zooming and ensures proper scaling on mobile devices -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>AR Client (Three.js Mock)</title>
    <style>
      /* CSS Variables for Therapeutic Color Management */
      :root {
        --therapeutic-color: rgba(255, 191, 0, 0); /* Default transparent; synced with EBD Engine */
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        overflow: hidden;
      }
      #scene {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      /* Mobile AR Camera Feed Styling */
      /* This video element displays the phone's rear camera feed */
      #video-background {
        position: fixed; /* Stays in place, doesn't scroll */
        top: 0;
        left: 0;
        width: 100vw; /* Full viewport width */
        height: 100vh; /* Full viewport height */
        object-fit: cover; /* Fills screen without distortion */
        z-index: -1; /* Behind all other elements (HUD & Orb) */
      }

      /* HCI Enhancement: Smooth UI Transitions (Reduces Cognitive Load) */
      /* Creates a premium, professional feel with gradual entrance animation */
      #medicalHUD {
        animation: slideUp 1.2s ease-out forwards;
      }

      @keyframes slideUp {
        0% {
          transform: translateY(100px);
          opacity: 0;
        }
        100% {
          transform: translateY(0);
          opacity: 1;
        }
      }

      /* HCI Enhancement: Responsive Design for Mobile */
      /* Professional layout: Top = Coaching, Center = Orb, Bottom = Dashboard Zone */

      /* Tablet and smaller screens */
      @media (max-width: 1024px) {
        #vitalsPanel,
        #insightsPanel {
          min-width: 220px !important;
          max-width: 280px !important;
          padding: 12px 15px !important;
        }
      }

      /* Mobile screens - landscape and portrait */
      @media (max-width: 768px) {
        /* Coaching Text - Top only, clear focus */
        #coachingText {
          bottom: auto !important;
          top: 12px !important;
          left: 50% !important;
          right: auto !important;
          width: 80% !important;
          transform: translateX(-50%) !important;
          max-width: 320px !important;
          background: rgba(0, 100, 150, 0.9) !important;
          padding: 10px 14px !important;
          font-size: 14px !important;
          font-weight: 600 !important;
          border: 1px solid rgba(100, 200, 255, 0.6) !important;
          border-radius: 8px !important;
          backdrop-filter: blur(8px);
          -webkit-backdrop-filter: blur(8px);
          text-align: center !important;
          line-height: 1.3 !important;
        }

        /* Dashboard Zone: Vitals Panel - Left side, compact */
        #vitalsPanel {
          top: 80px !important;
          bottom: auto !important;
          left: 8px !important;
          right: auto !important;
          width: auto !important;
          min-width: 140px !important;
          max-width: 180px !important;
          background: rgba(0, 20, 40, 0.92) !important;
          padding: 10px 12px !important;
          border-radius: 8px !important;
          border-width: 1.5px !important;
          backdrop-filter: blur(6px);
          -webkit-backdrop-filter: blur(6px);
        }

        /* Dashboard Zone: Insights Panel - Right side */
        #insightsPanel {
          top: 80px !important;
          bottom: auto !important;
          left: auto !important;
          right: 8px !important;
          width: auto !important;
          min-width: 140px !important;
          max-width: 180px !important;
          background: rgba(20, 20, 20, 0.92) !important;
          padding: 10px 12px !important;
          border-radius: 8px !important;
          border-width: 1.5px !important;
          backdrop-filter: blur(6px);
          -webkit-backdrop-filter: blur(6px);
          max-height: 240px !important;
          overflow-y: auto !important;
        }

        /* Compact text for narrow screens */
        #vitalsPanel div,
        #insightsPanel div {
          font-size: 10px !important;
          line-height: 1.35 !important;
          margin-bottom: 6px !important;
        }

        #liveHR,
        #liveHRV {
          font-size: 20px !important;
          display: inline-block !important;
        }

        #liveState {
          font-size: 12px !important;
        }

        /* Adjust header text sizes */
        #vitalsPanel > div:first-child,
        #insightsPanel > div:first-child {
          font-size: 10px !important;
          margin-bottom: 8px !important;
        }
      }

      /* Extra small screens - better stacking */
      @media (max-width: 480px) {
        #coachingText {
          top: 8px !important;
          width: 95% !important;
          padding: 8px 12px !important;
          font-size: 13px !important;
        }

        #vitalsPanel {
          left: 5px !important;
          min-width: 130px !important;
          max-width: 160px !important;
          padding: 8px 10px !important;
        }

        #insightsPanel {
          right: 5px !important;
          min-width: 130px !important;
          max-width: 160px !important;
          padding: 8px 10px !important;
          max-height: 200px !important;
        }

        #vitalsPanel div,
        #insightsPanel div {
          font-size: 9px !important;
          margin-bottom: 5px !important;
        }

        #liveHR,
        #liveHRV {
          font-size: 18px !important;
        }

        #liveState {
          font-size: 11px !important;
        }
      }

      /* Landscape orientation optimization */
      @media (max-width: 768px) and (orientation: landscape) {
        #coachingText {
          top: 5px !important;
          padding: 6px 10px !important;
          font-size: 12px !important;
        }

        #vitalsPanel,
        #insightsPanel {
          top: 40px !important;
          max-height: calc(100vh - 50px) !important;
        }
      }

      /* Interactive Room Tint Layer */
      /* Uses CSS mix-blend-mode: multiply to mathematically combine virtual color with real-world light */
      /* Background color is controlled by --therapeutic-color CSS variable (synced with EBD Engine) */
      #room-tint-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none; /* Allows clicking through to 3D objects */
        z-index: 5; /* Above camera feed but below HUD (z-index: 100) */
        mix-blend-mode: multiply; /* Mathematically combines color with real walls */
        background-color: var(--therapeutic-color);
        transition: background-color 2.0s ease-in-out; /* Smooth color transitions */
      }
    </style>
  </head>
  <body>
    <!-- Medical HUD Overlay -->
    <div
      id="medicalHUD"
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        font-family: &quot;Segoe UI&quot;, Tahoma, Geneva, Verdana, sans-serif;
        color: #e0e0e0;
        z-index: 100;
      "
    >
      <!-- Top-Left: Vitals Panel -->
      <div
        id="vitalsPanel"
        style="
          position: absolute;
          top: 20px;
          left: 20px;
          background: rgba(0, 20, 40, 0.85);
          border: 2px solid rgba(100, 200, 255, 0.6);
          border-radius: 8px;
          padding: 15px 20px;
          min-width: 280px;
          box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        "
      >
        <div
          style="
            font-size: 12px;
            color: #64c8ff;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 1px;
          "
        >
          ⚕ PATIENT VITALS
        </div>
        <div style="margin-bottom: 8px">
          <span style="color: #888; font-size: 11px">Heart Rate:</span><br />
          <span
            id="liveHR"
            style="color: #4fc3f7; font-size: 28px; font-weight: bold"
            >--</span
          >
          <span style="color: #888; font-size: 14px">bpm</span>
        </div>
        <div style="margin-bottom: 8px">
          <span style="color: #888; font-size: 11px">HRV (RMSSD):</span><br />
          <span
            id="liveHRV"
            style="color: #81c784; font-size: 28px; font-weight: bold"
            >--</span
          >
          <span style="color: #888; font-size: 14px">ms</span>
        </div>
        <div
          style="
            border-top: 1px solid rgba(100, 200, 255, 0.3);
            padding-top: 8px;
            margin-top: 8px;
          "
        >
          <span style="color: #888; font-size: 11px">Clinical State:</span
          ><br />
          <span
            id="liveState"
            style="
              color: #ffb74d;
              font-size: 16px;
              font-weight: bold;
              text-transform: uppercase;
            "
            >--</span
          >
        </div>
      </div>

      <!-- Bottom-Center: Coaching Text -->
      <div
        id="coachingText"
        style="
          position: absolute;
          bottom: 40px;
          left: 50%;
          transform: translateX(-50%);
          background: rgba(0, 0, 0, 0.7);
          border: 1px solid rgba(255, 255, 255, 0.3);
          border-radius: 6px;
          padding: 12px 24px;
          font-size: 16px;
          color: #fff;
          text-align: center;
          max-width: 350px;
        "
      >
        Breathe naturally and focus on the light...
      </div>

      <!-- Top-Right: Clinical Insights -->
      <div
        id="insightsPanel"
        style="
          position: absolute;
          top: 20px;
          right: 20px;
          background: rgba(20, 20, 20, 0.85);
          border: 2px solid rgba(150, 150, 150, 0.4);
          border-radius: 8px;
          padding: 15px 20px;
          min-width: 250px;
          max-width: 300px;
          box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        "
      >
        <div
          style="
            font-size: 12px;
            color: #aaa;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: 1px;
          "
        >
          📊 CLINICAL INSIGHTS
        </div>
        <div
          id="insightText"
          style="font-size: 13px; color: #ccc; line-height: 1.6"
        >
          Monitoring patient response...
        </div>
      </div>
    </div>

    <!-- Interactive Room Tint Layer -->
    <!-- Uses CSS mix-blend-mode: multiply to blend therapeutic color with real-world camera feed -->
    <!-- Color is controlled by --therapeutic-color CSS variable, synced with EBD Engine stress levels -->
    <div id="room-tint-layer"></div>

    <canvas id="scene"></canvas>

    <script src="/socket.io/socket.io.js"></script>

    <!-- Three.js (CDN) -->
    <script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>

    <script>
      // -----------------------------
      // 1) Socket
      // -----------------------------
      const socket = io();

      // -----------------------------
      // 2) Three.js scene + orb
      // -----------------------------
      const canvas = document.getElementById("scene");
      const renderer = new THREE.WebGLRenderer({
        canvas,
        antialias: true,
        alpha: true,
      });
      renderer.setPixelRatio(window.devicePixelRatio);

      const scene = new THREE.Scene();

      const camera = new THREE.PerspectiveCamera(60, 2, 0.1, 100);
      camera.position.set(0, 0, 3);

      // Step 6: Link to User Preference from Setup Screen (Must be declared early)
      // Read the therapeutic palette the patient selected
      const selectedPalette = localStorage.getItem('selectedPalette') || 'AMBER';
      // Palette colors synced with backend ebdEngine.js colorMapping (stress colors)
      const paletteColorMap = {
        'AMBER': '#FFBF00',   // Amber - Cortisol reduction, warm comfort
        'VIOLET': '#4B0082',  // Indigo - Deep nervous system calming
        'PINK': '#FFB6C1',    // Light Pink - Emotional soothing
        'EARTH': '#8B7355'    // Brown - Grounding, stability
      };
      const initialVignetteColor = paletteColorMap[selectedPalette] || '#FFBF00';

      // Step 7: Ambient Wash Light (Tints the room walls with therapeutic color)
      // This creates the "Room Redesign" effect by staining the physical environment
      const ambientLight = new THREE.AmbientLight(initialVignetteColor, 0.3); // Starts with user's palette
      scene.add(ambientLight);
      
      // Target ambient values for smooth transitions
      const targetAmbientColor = new THREE.Color(initialVignetteColor);
      const currentAmbientColor = new THREE.Color(initialVignetteColor);
      let targetAmbientIntensity = 0.3; // Subtle baseline
      let currentAmbientIntensity = 0.3;

      const dir = new THREE.DirectionalLight(0xffffff, 0.8);
      dir.position.set(2, 2, 3);
      scene.add(dir);

      // Therapeutic Orb
      // Mobile AR Optimization: Reduced size from 0.8 to 0.4 for better visibility on small screens
      const geometry = new THREE.SphereGeometry(0.4, 64, 64);
      const material = new THREE.MeshStandardMaterial({
        color: new THREE.Color("#ffffff"),
        emissive: new THREE.Color("#000000"),
        roughness: 0.4,
        metalness: 0.1,
      });
      const therapeuticOrb = new THREE.Mesh(geometry, material);
      scene.add(therapeuticOrb);

      // AR Positioning: Move orb down for more natural AR experience
      therapeuticOrb.position.set(0, -0.5, 0); // Moves it down by 0.5 units

      // HCI Enhancement: Glowing Orb Effect (Visual Focus & Bloom)
      // Enhances visibility and creates a premium, professional look
      therapeuticOrb.material.emissiveIntensity = 0.8; // Increased glow intensity
      therapeuticOrb.material.transparent = true;
      therapeuticOrb.material.opacity = 0.9;

      // Add Glow Mesh (The Aura) - Creates a soft outer glow effect
      const glowGeometry = new THREE.SphereGeometry(0.45, 64, 64); // Slightly larger than orb
      const glowMaterial = new THREE.MeshBasicMaterial({
        color: 0xffffff, // Initial color; will be synced to orb color in animate loop
        transparent: true,
        opacity: 0.2, // Subtle transparency for aura effect
        side: THREE.BackSide, // Render from inside to create glow
      });
      const glowMesh = new THREE.Mesh(glowGeometry, glowMaterial);
      therapeuticOrb.add(glowMesh); // Attach glow to orb so they move together

      // -----------------------------
      // Vignette HUD Plane (Breathing Glow Effect)
      // -----------------------------
      // Scientific Logic: Transparent center ensures patients can see medication/exits (NFR3 Accessibility)
      // Creates a calming peripheral glow that breathes with the therapeutic guidance
      
      function createVignetteTexture() {
        const size = 512;
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');

        // Create radial gradient: transparent center, white edges
        const gradient = ctx.createRadialGradient(
          size / 2, size / 2, size * 0.3, // Inner circle (30% radius - clear center)
          size / 2, size / 2, size / 2    // Outer circle (50% radius - full edge)
        );
        
        gradient.addColorStop(0, 'rgba(255, 255, 255, 0)');    // Fully transparent center
        gradient.addColorStop(0.6, 'rgba(255, 255, 255, 0)');  // Stay transparent
        gradient.addColorStop(0.85, 'rgba(255, 255, 255, 0.4)'); // Begin fade
        gradient.addColorStop(1, 'rgba(255, 255, 255, 0.7)');  // Solid at edges

        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, size, size);

        const texture = new THREE.CanvasTexture(canvas);
        texture.needsUpdate = true;
        return texture;
      }

      const vignetteTexture = createVignetteTexture();
      
      // Use the palette color initialized earlier (see Step 6 above)
      const vignetteMaterial = new THREE.MeshBasicMaterial({
        map: vignetteTexture,
        color: new THREE.Color(initialVignetteColor), // Apply user's therapeutic preference
        transparent: true,
        opacity: 0, // Start invisible
        depthTest: false,
        depthWrite: false,
        blending: THREE.AdditiveBlending // Creates soft glow effect
      });

      // Create plane that fills camera view
      const vignetteGeometry = new THREE.PlaneGeometry(2, 2);
      const vignetteMesh = new THREE.Mesh(vignetteGeometry, vignetteMaterial);
      
      // Parent to camera so it follows patient's view
      vignetteMesh.position.z = -1; // Position just in front of camera near plane
      camera.add(vignetteMesh);
      scene.add(camera); // Ensure camera is in scene for child to render

      // ========================================
      // FULL ROOM TINT (The Color Wash Plane)
      // ========================================
      // Full-screen overlay that 'stains' the entire room with therapeutic color
      // This plane covers the entire screen and sits between camera and 3D orb
      // MultiplyBlending ensures walls change color (e.g., white wall + Violet = Violet room)
      const roomTintGeo = new THREE.PlaneGeometry(2, 2);
      const roomTintMat = new THREE.MeshBasicMaterial({
        color: new THREE.Color(initialVignetteColor), // Use user's therapeutic palette
        transparent: true,
        opacity: 0, // Starts invisible
        blending: THREE.MultiplyBlending, // CRITICAL: Multiply acts like "color wash" - stains the real-world walls
        depthTest: false,
        depthWrite: false
      });

      const roomTintMesh = new THREE.Mesh(roomTintGeo, roomTintMat);
      roomTintMesh.position.z = -0.15; // Positioned behind UI but in front of 3D orb
      camera.add(roomTintMesh);

      // Breathing animation variables
      let vignetteTargetOpacity = 0;
      let vignetteCurrentOpacity = 0;
      let roomTintTargetOpacity = 0; // Full-room tint target (responsive to stress level)
      let roomTintCurrentOpacity = 0; // Smooth lerp value for room redesign
      const VIGNETTE_FADE_SPEED = 0.05; // Slow lerp for cardiac patient safety

      // Resize
      function resize() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      }
      window.addEventListener("resize", resize);
      resize();

      // -----------------------------
      // 3) Target values (for smooth transitions)
      // -----------------------------
      const targetColor = new THREE.Color(0xffffff); // Default color
      const currentColor = new THREE.Color(0xffffff); // Initial color
      let targetEmissive = new THREE.Color("#000000");
      let targetEmissiveIntensity = 0.2;

      let isPulsing = false;

      // Breathing loop variables (Task 2.3)
      let breathingInterval = null;
      let currentBreathingStep = "IN"; // Alternates between IN and OUT

      function cctToHex(cctK) {
        // Simple mapping (enough for mock)
        if (cctK <= 3000) return "#FFD8A8"; // warm
        if (cctK <= 4000) return "#FFF1CC"; // neutral warm
        return "#FFFFFF"; // cool/white
      }

      // ========================================
      // Room Color Synchronization (Interactive Layer)
      // ========================================
      // Updates the --therapeutic-color CSS variable based on EBD Engine stress level
      // This synchronizes the DOM-based room tint layer with the Three.js rendering
      function syncRoomColor(hexColor, stressLevel) {
        const root = document.documentElement;
        
        // Parse hex color to RGB components
        // Format: #RRGGBB → r, g, b (0-255)
        const r = parseInt(hexColor.slice(1, 3), 16);
        const g = parseInt(hexColor.slice(3, 5), 16);
        const b = parseInt(hexColor.slice(5, 7), 16);
        
        // Apply tint opacity only during HIGH_STRESS
        // Otherwise, keep transparent for normal viewing
        const alpha = (stressLevel === 'HIGH_STRESS') ? 0.3 : 0;
        
        // Update the CSS variable - This changes the entire room's color tint
        // mix-blend-mode: multiply makes white walls become the therapeutic color
        root.style.setProperty('--therapeutic-color', `rgba(${r}, ${g}, ${b}, ${alpha})`);
      }

      // ========================================
      // Global Lighting Update (Ambient Method)
      // ========================================
      // Tints every 3D object in the scene by updating the ambient light color
      // Objects with MeshStandardMaterial or MeshPhongMaterial react to this light
      // Creates an immersive effect where the entire room appears to be under colored light
      function updateGlobalLighting(targetHex) {
        const color = new THREE.Color(targetHex);
        
        // Smoothly transition ambient light color using lerp
        // 0.05 = slow transition (medical-grade smoothness for cardiac patients)
        ambientLight.color.lerp(color, 0.05);
      }

      // ========================================
      // Furniture Material Update (Material Swap Method)
      // ========================================
      // Directly updates material colors on furniture objects when stress level changes
      // Creates the effect of the room being "physically repainted" to the therapeutic color
      // Traverses all mesh nodes in the furniture group and transitions their colors
      function updateFurnitureColor(newHex) {
        // Check if furniture group exists in the scene
        // furnitureGroup should be defined if 3D models are loaded
        if (typeof furnitureGroup !== 'undefined' && furnitureGroup) {
          const newColor = new THREE.Color(newHex);
          
          // Traverse all child nodes in the furniture group
          furnitureGroup.traverse((node) => {
            // Only update mesh objects (skip lights, cameras, etc.)
            if (node.isMesh && node.material) {
              // Smoothly transition each furniture piece's material color
              // 0.05 = slow transition for smooth visual experience
              node.material.color.lerp(newColor, 0.05);
            }
          });
        }
      }

      function stopPulse() {
        isPulsing = false;
        therapeuticOrb.scale.set(1, 1, 1);
      }

      // -----------------------------
      // 3.5) Breathing Loop Functions (Task 2.3)
      // -----------------------------
      let patientMessage = ""; // Store the HIGH_STRESS message context

      function startBreathingLoop(contextMessage = "") {
        // Update patient message even if interval is already running
        // (vitals may change while still in HIGH_STRESS)
        patientMessage = contextMessage;

        const coachingElement = document.getElementById("coachingText");

        // Update UI immediately with current step and new message
        if (breathingInterval) {
          // Interval already running - update current display with new message
          const currentStep =
            currentBreathingStep === "IN" ? "BREATHE IN ⬆️" : "BREATHE OUT ⬇️";
          coachingElement.textContent = patientMessage + " " + currentStep;
          return;
        }

        // Set initial message immediately (don't wait for first interval)
        coachingElement.textContent = patientMessage + " BREATHE IN ⬆️";
        currentBreathingStep = "IN";
        vignetteTargetOpacity = 0.5; // Breathe IN = glow appears

        breathingInterval = setInterval(() => {
          if (currentBreathingStep === "IN") {
            coachingElement.textContent = patientMessage + " BREATHE OUT ⬇️";
            currentBreathingStep = "OUT";
            vignetteTargetOpacity = 0.15; // Breathe OUT = glow fades
          } else {
            coachingElement.textContent = patientMessage + " BREATHE IN ⬆️";
            currentBreathingStep = "IN";
            vignetteTargetOpacity = 0.5; // Breathe IN = glow appears
          }
        }, 4000); // 4 seconds per phase (8-second complete cycle)
      }

      function stopBreathingLoop() {
        clearInterval(breathingInterval);
        breathingInterval = null;
        currentBreathingStep = null; // Reset phase for next cycle
        vignetteTargetOpacity = 0; // Fade out vignette when stopping
      }

      // -----------------------------
      // 4) Socket listener - Handle ar:command from server
      // -----------------------------
      socket.on("ar:command", (data) => {
        // Update live display at top
        document.getElementById("liveHR").textContent = data.vitals.hr;
        document.getElementById("liveHRV").textContent = data.vitals.hrv;
        document.getElementById("liveState").textContent = data.state;

        // Map the clinical/scientific reasoning to the top right panel
        document.getElementById("insightText").textContent =
          data.message_clinical;

        // --- Task 2.4: State-Based Styling (Visual Cues) ---
        const vPanel = document.getElementById("vitalsPanel");
        const iPanel = document.getElementById("insightsPanel");

        if (data.state === "HIGH_STRESS") {
          // Apply Calming Blue Glow
          vPanel.style.borderColor = "#2e8bff";
          vPanel.style.boxShadow = "0 0 20px rgba(46, 139, 255, 0.6)";
          iPanel.style.borderColor = "#2e8bff";
        } else if (data.state === "BRADYCARDIA_ALERT") {
          // Apply Urgent Red Glow
          vPanel.style.borderColor = "#ff5252";
          vPanel.style.boxShadow = "0 0 20px rgba(255, 82, 82, 0.6)";
          iPanel.style.borderColor = "#ff5252";
        } else {
          // Reset to Neutral
          vPanel.style.borderColor = "rgba(100, 200, 255, 0.6)";
          vPanel.style.boxShadow = "0 4px 20px rgba(0, 0, 0, 0.5)";
          iPanel.style.borderColor = "rgba(150, 150, 150, 0.4)";
        }

        // Handle breathing loop for HIGH_STRESS state (Task 2.3)
        if (data.state === "HIGH_STRESS") {
          startBreathingLoop(data.message_patient);
        } else {
          stopBreathingLoop();
          // Reset to the default message from the server if not stressed
          document.getElementById("coachingText").textContent =
            data.message_patient;
        }

        const v = data.visual;

        // Convert color format: string (hex) or object {cctK}
        let hex;
        if (typeof v.colorOrCCT === "string") {
          hex = v.colorOrCCT; // Direct hex like #2E8BFF
        } else if (typeof v.colorOrCCT === "object" && v.colorOrCCT.cctK) {
          hex = cctToHex(v.colorOrCCT.cctK); // CCT -> hex conversion
        } else {
          console.error("❌ Invalid colorOrCCT format:", v.colorOrCCT);
          return;
        }

        // Step 8: Perfect Orb-Vignette-Room Synchronization
        // Update target colors (lerp will handle smooth transition)
        targetColor.set(hex);
        targetEmissive.set(hex);

        // Update emissive intensity
        targetEmissiveIntensity = Math.max(0, Math.min(1, v.intensity)) * 2.0;

        // Sync vignette color with therapeutic palette (The Glow)
        vignetteMaterial.color.set(hex);
        roomTintMat.color.set(hex); // Also sync the room tint plane color
        
        // Sync ambient light for wall wash effect (The Room Tint)
        targetAmbientColor.set(hex);
        
        // Trigger room redesign based on stress level
        // When stressed, apply 20-30% color wash to stain the entire room
        if (data.state === 'HIGH_STRESS') {
          targetAmbientIntensity = 0.6; // Stronger color wash during stress
          roomTintTargetOpacity = 0.25; // Apply 25% color wash over entire room during high stress
        } else if (data.state === 'BRADYCARDIA_ALERT') {
          targetAmbientIntensity = 0.5; // Moderate intensity for alerts
          roomTintTargetOpacity = 0.0; // No room tint for alerts
        } else {
          targetAmbientIntensity = 0.3; // Baseline ambient
          roomTintTargetOpacity = 0.0; // No tint when calm
        }

        // Sync the DOM-based room tint layer with the EBD Engine
        // This updates the --therapeutic-color CSS variable for the interactive layer
        syncRoomColor(hex, data.state);

        // Update global lighting to tint all objects in the scene
        // Objects with MeshStandardMaterial/MeshPhongMaterial react to ambient light color
        updateGlobalLighting(hex);

        // Update furniture materials directly for immersive "physically repainted" effect
        // Creates the sense that the room environment has been therapeutically redesigned
        updateFurnitureColor(hex);

        // Handle bradycardia pulse effect
        if (data.state === "BRADYCARDIA_ALERT") {
          isPulsing = true;
        } else {
          stopPulse();
        }
      });

      // -----------------------------
      // 5) Render loop (smooth transitions + pulse)
      // -----------------------------
      let currentEmissive = new THREE.Color("#000000");
      let currentEmissiveIntensity = 0.2;

      function animate() {
        requestAnimationFrame(animate);

        // Smooth color transitions using lerp (10% per frame = ~1.5 sec fade)
        currentColor.lerp(targetColor, 0.1);
        currentEmissive.lerp(targetEmissive, 0.1);
        currentEmissiveIntensity +=
          (targetEmissiveIntensity - currentEmissiveIntensity) * 0.1;

        // Apply smoothed colors to orb material (The Source)
        therapeuticOrb.material.color.copy(currentColor);
        therapeuticOrb.material.emissive.copy(currentEmissive);
        therapeuticOrb.material.emissiveIntensity = currentEmissiveIntensity;

        // Sync glow aura color to match orb during state transitions
        glowMesh.material.color.copy(currentColor);
        
        // Step 7 Continued: Smooth ambient wash transitions (The Room)
        currentAmbientColor.lerp(targetAmbientColor, 0.05); // Slower lerp for subtle wall tint
        currentAmbientIntensity += (targetAmbientIntensity - currentAmbientIntensity) * 0.05;
        ambientLight.color.copy(currentAmbientColor);
        ambientLight.intensity = currentAmbientIntensity;

        // Breathing vignette animation (slow lerp prevents startling cardiac patients)
        vignetteCurrentOpacity += (vignetteTargetOpacity - vignetteCurrentOpacity) * VIGNETTE_FADE_SPEED;
        vignetteMaterial.opacity = vignetteCurrentOpacity;

        // Full room tint animation (smooth color wash during stress)
        // MultiplyBlending ensures the walls are 'stained' with the therapeutic color
        roomTintCurrentOpacity += (roomTintTargetOpacity - roomTintCurrentOpacity) * VIGNETTE_FADE_SPEED;
        roomTintMat.opacity = roomTintCurrentOpacity;

        // Pulse animation for bradycardia alert
        if (isPulsing) {
          const scale = 1.0 + Math.sin(Date.now() * 0.005) * 0.15; // Pulse between 0.85 and 1.15
          therapeuticOrb.scale.set(scale, scale, scale);
        }

        renderer.render(scene, camera);
      }
      animate(); // Start the animation loop

      // ========================================
      // MOBILE AR: Camera Activation Function
      // ========================================
      // This function requests access to the phone's rear camera
      // and displays the live feed behind the 3D scene
      // Note: Requires HTTPS or localhost for getUserMedia to work
      let cameraStream = null; // Store stream reference for cleanup

      async function startCamera() {
        try {
          // Request camera access - 'environment' = rear camera
          cameraStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
          });

          // Create a <video> element to display the camera feed
          const video = document.createElement("video");
          video.id = "video-background"; // Links to CSS styling above
          video.autoplay = true; // Starts playing automatically
          video.playsInline = true; // Required for iOS/Safari to play inline
          video.srcObject = cameraStream; // Connect camera stream to video element
          document.body.appendChild(video); // Add to page

          // Make Three.js background transparent so camera feed shows through
          renderer.setClearColor(0x000000, 0); // (color, alpha) - alpha 0 = fully transparent
        } catch (err) {
          // If user denies camera permission or camera not available
          alert("Camera Error: Please allow camera access. Note: Camera requires HTTPS or localhost.");
          console.error(err);
        }
      }

      // Cleanup camera stream when page is closed
      window.addEventListener("beforeunload", () => {
        if (cameraStream) {
          cameraStream.getTracks().forEach(track => track.stop());
        }
      });

      // Start camera automatically when page finishes loading
      window.addEventListener("load", startCamera);
    </script>
  </body>
</html>
